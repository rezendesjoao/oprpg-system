  description:
    value: '<p>Em algum momento do passado, você esteve no auge. Foi temido, respeitado ou admirado — talvez como um grande guerreiro, capitão, líder político ou figura lendária. Porém, uma derrota esmagadora mudou tudo.</p><p>Você perdeu um confronto decisivo, foi traído, humilhado publicamente ou teve seus sonhos destruídos diante do mundo. Desde então, vive com o peso desse fracasso, buscando se reerguer, provar seu valor novamente ou apenas entender onde errou.</p><p>Essa queda o enfraqueceu consideravelmente, e sua recuperação tem sido lenta e dolorosa. No entanto, também moldou quem você é agora, tornando-o mais cauteloso, resiliente ou consumido por um desejo obsessivo de redenção.</p><p><em>Aumento no Valor de Atributo recomendado: Vontade.</em></p>'
