  description:
    value: <p>Você se sente mais confortável quando segue hábitos simples e previsíveis, como acordar cedo, organizar seus pertences ou realizar pequenas tarefas diárias sempre da mesma forma. Essa constância te acalma e ajuda a manter o foco.</p><p>Sempre que iniciar um dia após um descanso longo completo, você pode escolher uma única jogada de d20 feita fora de combate para rolar duas vezes e escolher o melhor resultado.</p><p>Essa jogada deve representar uma ação rotineira ou cotidiana (como construir algo, navegar, negociar compras, investigar locais e etc.).</p><p>Essa característica não pode ser usada em situações de urgência, perseguições, combates ou eventos claramente caóticos, a critério do Narrador.</p>
