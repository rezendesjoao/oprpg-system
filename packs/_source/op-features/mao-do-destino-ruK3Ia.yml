system:
  description:
    value: '<p>Uma vez por descanso longo, antes de tomar uma decisão importante, você pode pedir ao Narrador que revele a consequência futura mais provável da sua ação.</p><p>Além disso, em momentos de extrema necessidade, uma reviravolta significativa pode ocorrer, alterando drasticamente o curso dos acontecimentos. Muitos chamariam isso de um ''roteiro conveniente'', mas mudanças inimagináveis surgem justamente nos instantes mais desesperadores: um Fruto aparentemente ordinário pode revelar-se um poderoso Fruto Mítico; um corpo comum pode ser, na verdade, resultado de uma experiência científica oculta; ou o personagem pode descobrir ser portador de um Haki do Rei excepcional, entre outras possibilidades.</p><p>Essas reviravoltas representam a intervenção do destino e só podem ocorrer uma única vez durante toda a aventura.</p><p>Exemplos de gatilhos para a revelação: A morte definitiva do personagem (que indique a perda da ficha); Uma situação que desfechou em uma derrota que encerrará a aventura; Uma situação crítica sem qualquer possibilidade plausível de superação.</p><p>Exemplos de efeitos imediatos da reviravolta: Recuperar completamente os Pontos de Vida e Pontos de Poder; Criar uma oportunidade clara de fuga de uma situação desesperadora; Resolver um obstáculo aparentemente implacável, (como finalmente causar danos a um oponente intangível).</p><p>Exemplos de resultados permanentes da reviravolta: A mudança definitiva da Akuma no Mi que o personagem já tinha; A mudança permanente da espécie do personagem; Acesso a novas características.</p><p>Os gatilhos, efeitos e resultados ficam sempre a critério do Narrador, de acordo com a situação e a narrativa da campanha. Uma vez ativada, a Mão do Destino não pode ser revertida, alterada ou reutilizada até o fim da aventura.</p>'
