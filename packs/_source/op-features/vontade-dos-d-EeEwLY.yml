  description:
    value: '<p>O Governo Mundial teme suas ações, por conta disso, seus atos notórios sempre receberam mais atenção que o comum, fazendo com que sua recompensa aumente muito mais que o normal.</p><p>Além disso, a sua forte determinação cria um laço especial com as pessoas, mesmo sem querer. Ao zarpar de uma ilha, que esteja em gratidão com você, você pode fazer um Teste de Atributo de Vontade (Sorte), com a CD definida pelo Narrador, ao ser bem-sucedido, até 3 habitantes podem querer fazer parte da sua tripulação.</p><p>Caso o seu personagem morra, o novo personagem criado poderá herdar sua vontade, mantendo características do antigo personagem à sua escolha, como: Pontos de Vida relacionado ao Estilo de Combate (caso escolha um com mesmo tipo de dado de vida), Akuma no Mi, treinamentos, equipamentos, dinheiro e nível. Sendo obrigatório escolher esse antecedente novamente.</p>'
