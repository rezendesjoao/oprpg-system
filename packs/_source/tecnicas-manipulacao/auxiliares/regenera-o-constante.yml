system:
  description:
    value: "<p>Ao ativar essa habilidade, você utiliza energia reversa para se curar constantemente durante um combate. No início de cada um de seus turnos, você recupera 3 vezes o seu nível em Pontos de Vida [[/heal 3 * @details.level]]. Após recuperar 9 vezes o seu nível, você para de se curar dessa forma. Esse efeito reseta toda vez que você acerta um Fulgor Negro.</p><p>Você consome 6 PA no início de cada um de seus turnos para manter essa cura ativa.</p><hr><p><strong>Duração:</strong>\_Especial</p><p><strong>Alcance:</strong> Pessoal</p><p><strong>Requisito:</strong> Ação Bônus</p><p><strong>Custo:</strong> 6 PA</p>"
