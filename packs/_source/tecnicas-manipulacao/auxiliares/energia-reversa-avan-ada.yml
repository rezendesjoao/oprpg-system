system:
  description:
    value: "<p>Ao ativar essa habilidade, você pode utilizar o poder da energia reversa para se regenerar dos piores tipo de feridas. Você pode escolher uma das seguintes opções:</p><p><strong>Instantâneo (8 PA):</strong> Você recupera uma parte superficial ou pequena do corpo, como olho;</p><p><strong>1 rodada (25 PA):</strong> Você recupera totalmente um membro perdido ou parte dele;</p><p><strong>3 rodadas (50 PA):</strong> Você mantém sua vida e começa a se regenerar de uma ferida letal, como perder um órgão ou ter ele terrivelmente danificado.</p><p class=\"MsoNormal\">\_</p><p>O custo dessa técnica é retirado primeiro da sua Energia Amaldiçoada Gerada e depois dos seus Pontos de Energia Amaldiçoada total.</p><hr><p class=\"MsoNormal\"><strong>&lt;Alternativamente&gt;</strong> Você pode utilizar uma ação de poder e 8 PA da sua Energia Gerada para curar 6d10 Pontos de Vida. Essa cura compartilha o limite do \"Regeneração Constante\" assim como seu efeito de resetar o limite com Fulgor Negro.</p><p>Você pode gastar 2 PA para adicionar 1d10 de cura até um máximo de 15d10.</p><hr><p><strong>Duração:</strong>\_Instantâneo</p><p><strong>Alcance:</strong> Pessoal</p><p><strong>Requisito:</strong> Ação de Poder</p><p><strong>Custo:</strong> Especial</p>"
