system:
  description:
    value: "<p>Ao acumular aura em suas pernas, você pode aumentar sua velocidade a fim de se mover mais rápido pelo campo de batalha, recebendo 3 metros de deslocamento para cada 1 Ponto de Aura gasto, até um máximo de 15 metros, mas esse deslocamento não dobra em caso de disparada. Você não consome nenhuma ação para ativar esse efeito.</p><hr><p><strong>Duração:</strong>\_Até o fim do turno atual</p><p><strong>Alcance:</strong> Pessoal</p><p><strong>Requisito:</strong> Gyo, Especial</p><p><strong>Custo:</strong> 1 PA</p>"
