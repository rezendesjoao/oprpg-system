system:
  description:
    value: "<p>Você concentra sua aura em uma proporção de 70% a 30% em seu membro antes de desferir um golpe contra a criatura inimiga. O alvo deve ser bem sucedido em um Salvaguarda de [[/save con dc=@attributes.spell.dc]] para não perder sua ação bônus até o início do próximo turno.</p><p>O alcance dessa habilidade varia de acordo com o usuário, sendo Toque para aprimorador, alcance de 12 metros para emissor ou especialista, ou o alcance da arma nas outras categorias.</p><hr><p><strong>Duração:</strong>\_Instantâneo</p><p><strong>Alcance:</strong>\_Especial</p><p><strong>Requisito:</strong> Ação de Poder</p><p><strong>Dano:</strong> 4d10 de dano Contundente, Cortante ou Perfurante</p><p><strong>Custo:</strong> 4 PA</p>"
