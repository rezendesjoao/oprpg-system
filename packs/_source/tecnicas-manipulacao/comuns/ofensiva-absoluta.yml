system:
  description:
    value: "<p>Você desfere um golpe extremamente poderoso contra o alvo ao imbuir quase toda sua aura em um único ponto antes de desferir um golpe. Essa técnica é feita com vantagem e tem margem de acerto crítico 18-20.</p><p>Se esse ataque for feito por um emissor, seu alcance se torna de 21 metros.\_\_\_\_\_</p><hr><p><strong>Duração:</strong>\_Instantâneo</p><p><strong>Alcance:</strong>\_Toque</p><p><strong>Requisito:</strong> Ação de Poder</p><p><strong>Dano:</strong> 10d10 de dano Contundente, Cortante ou Perfurante</p><p><strong>Custo:</strong> 10 PA</p>"
