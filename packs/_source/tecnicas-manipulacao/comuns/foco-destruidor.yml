system:
  description:
    value: "<p>Ao concentrar grande parte da sua aura em um único membro ou arma, você desfere um golpe contra a criatura, liberando toda aura acumulada e empurrando o alvo por 6 metros caso ela falhe em uma Salvaguarda de [[/save str dc=@attributes.spell.dc]].</p><p>\_\_\_\_\_\_\_\_\_\_\_ Se, durante o empurrão, a criatura atingir um objeto ou estrutura de 1,5 metros de raio ou maior, ela recebe [[/damage 4d8 bludgeoning]] de dano Contundente extra.</p><hr><p><strong>Duração:</strong>\_Instantâneo</p><p><strong>Alcance:</strong>\_Especial</p><p><strong>Requisito:</strong> Ação de Poder</p><p><strong>Dano:</strong> 8d10 de dano Contundente, Cortante ou Perfurante</p><p><strong>Custo:</strong> 8 PA</p>"
