name: Cientista
type: feat
img: icons/sundries/scrolls/scroll-writing-tan.webp
system:
  description:
    value: '<p>O cientista busca, por meio do conhecimento, explorar e desvendar os segredos do universo, criando soluções para problemas complexos. Sua genialidade permite reproduzir praticamente tudo aquilo que consiga conceber e entender — embora o alto custo de suas criações seja seu maior inimigo e limitação.</p><p><strong>FATOR LINHAGEM</strong></p><p>Todas as formas de vida possuem o Fator Linhagem, e sua manipulação pode alterar profundamente sua essência. A forma mais comum de modificar esse fator é consumir uma Akuma no Mi, recebendo habilidades sobrenaturais. A seguir estão as aplicações mais relevantes desse conhecimento. Os detalhes essenciais estão descritos, mas o Narrador pode exigir requisitos adicionais.</p><p>Para realizar qualquer uma das criações abaixo, os seguintes requisitos devem ser atendidos:</p><ul><li>Uma cápsula de recriação genética, no valor de ฿ 1.500.000.000 em materiais, com 1 mês de construção, tendo o formato de um cubo de 3 metros (sua construção deve ser realizada por um engenheiro);</li><li>Estar em um laboratório ou ambiente adequado;</li><li>Energia constante durante todo o processo, consumindo 1 bateria grande por dia.</li></ul><p><strong>GREEN BLOOD</strong></p><p>O Fator Linhagem de um usuário de Akuma no Mi pode ser estudado e replicado, permitindo criar uma substância sanguínea capaz de conceder ao usuário os mesmos poderes do fruto analisado.</p><p>Após ser bem-sucedido em um Teste de Atributo de Sabedoria CD 17, o cientista pode decifrar o Fator Linhagem e sintetizar o green blood. Para utilizá-lo, o frasco deve ser injetado diretamente na veia da criatura, e seus efeitos duram até que todos os PP sejam gastos ou até o término de um descanso longo. Cada frasco concede 10 Pontos de Poder, utilizáveis apenas em Técnicas do fruto estudado.</p><p>Custo: ฿ 200.000.000 por frasco.</p><p>Tempo de Sintetização: 12 horas na cápsula genética.</p><p>Enquanto uma criatura estiver sob os efeitos do Green Blood, ela estará sujeita a todas as fraquezas inerentes a um usuário de Akuma no Mi.</p><p><strong>AKUMA NO MI ARTIFICIAL</strong></p><p>Outra forma de manipular o Fator de Linhagem é recriar artificialmente a Akuma no Mi consumida por alguém, desde que seja uma Zoan. O fruto artificial replica plenamente suas características — com exceção do despertar.</p><p>Após um Teste de Atributo de Sabedoria CD 17, estando em um laboratório adequado, o cientista pode decifrar o Fator de Linhagem e iniciar a criação do fruto.</p><p>Custo: ฿ 2.500.000.000 por fruto.</p><p>Tempo de Criação: 1 mês na cápsula genética.</p><p><strong>CLONAGEM</strong></p><p>Ao decompor o Fator de Linhagem de um ser vivo e ser bem-sucedido em um Teste de Atributo de Sabedoria CD 15, você se torna capaz de recriar completamente a criatura por meio de clonagem.</p><ul><li>O tempo para clonagem dentro da capsula genética é de 6 meses + 1 mês para cada ano de envelhecimento da criatura;</li><li>O custo depende da quantidade de material disponível da criatura:</li><li>Amostras Pequenas (saliva, fios de cabelo, etc.): ฿ 1.000.000.000 + ฿ 100.000.000 por mês.</li><li>Corpo Morto Completo: Custo e tempo total são reduzidos pela metade.</li></ul><p>A criatura clonada será controlada pelo Narrador, exceto no caso de personagens mortos de jogadores, que podem ser controlados novamente por seus respectivos jogadores.</p><p>Além da clonagem completa, o mesmo método pode ser usado para criar membros ou órgãos, levando 1 mês e custando ฿ 100.000.000 cada.</p><p><strong>MELHORIA GENÉTICA</strong></p><p>Você pode conceder a uma criatura os mesmos benefícios da característica ''Heat'' dos lunarianos, podendo alterar o tipo de dano de ''Fogo'' para qualquer outro — exceto ''Psíquico'', ''Energia'', ''Trovejante'' e ''Verdadeiro''.</p><p>O personagem deve passar por um tratamento mensal que demora 1 hora e custa ฿ 1.000.000. Recebendo esses benefícios após 3 meses de tratamento, mas só se tornando permanente após 1 ano de tratamento.</p><p>Alternativamente, pelo mesmo custo e duração, você pode garantir um benefício diferente que garante um aumento de PV máximos igual a 4 vezes o nível de personagem da criatura e proficiência em uma perícia qualquer, com exceção das perícias de ''Haki'', ''Sobrenatural'' e ''Sorte''. Criaturas não podem passar por ambos tratamentos.</p><p><strong>OBJETO USUÁRIO</strong></p><p>Além da manipulação do Zero, você também possui o conhecimento necessário para combinar o Fator de Linhagem de uma Akuma no Mi do tipo Zoan com objetos ou armas inanimadas.</p><p>Após o tempo adequado de permanência de ambos os elementos dentro da cápsula de recriação, ocorre a fusão: o objeto passa a abrigar a consciência existente no fruto, replicando plenamente suas características e poderes.</p><p>Custo: ฿ 500.000.000.</p><p>Tempo de Criação: 1 mês na cápsula genética.</p><p><strong>CIÊNCIA AVANÇADA</strong></p><p>Além do conhecimento genético o cientista consegue aplicar o conhecimento de outras áreas com muita eficácia. Sendo capaz de criar tecnologias complexas.</p><p><strong>CRIAR RAID SUIT</strong></p><p>O cientista é capaz de criar um traje de batalha extremamente poderoso, conhecido como Raid Suit — uma tecnologia avançada capaz de se tornar a principal força militar de uma nação (regras e descrições detalhadas no Guia do Narrador).</p><p>Esses trajes só podem ser utilizados por personagens que tenham passado por 1 ano completo de tratamento da característica ''Melhoria Genética'' e não podem ser usados por personagens de nível 10 ou inferior.</p><p>Custo: ฿ 1.000.000.000.</p><p>Tempo de Criação: 1 semana.</p><p><strong>CIBORGUIZAÇÃO</strong></p><p>Você tem acesso a tecnologias que permitem que criaturas passem por intervenções mecânicas para modificar seus corpos. As mesmas modificações também podem ser aplicadas a robôs criados por engenheiros.</p><p>Sempre que um personagem recebe uma prótese mecânica ou passa por uma modificação corporal, ele adquire uma das habilidades presentes na característica ''Corpo Robótico'' do Estilo de Combate Ciborgue (Capítulo 3), desde que seja coerente com a prótese e o membro modificado.</p><p>É necessária uma prótese ou dispositivo criado por seus conhecimentos, em conjunto com os de um engenheiro, e a aplicação deve ser realizada por meio de uma cirurgia executada por um médico. Caso você não possua essas profissões, outros personagens com elas devem auxiliar no processo.</p><p>Além das próteses, você pode realizar melhorias tecnológicas menores, que concedem os seguintes benefícios:</p><ul><li>Sentidos Aprimorados: Você recebe proficiência em Testes de Percepção baseados em visão ou audição. Além disso, pode utilizar o seu atributo de Constituição no lugar desses testes.</li><li>Disparador: Você tem acesso à Técnica ''Laser'', desde que já seja capaz de utilizar pelo menos uma Técnica de 3º grau.</li></ul><p><strong>LASER (3º Grau)</strong></p><p>Apontando uma parte escolhida do corpo para essa função, você concentra uma grande quantidade de energia e libera um poderoso laser. Toda a criatura dentro da área da Técnica deve fazer uma Salvaguarda de Destreza. Sofrendo todo o dano se falhar ou metade desse dano se obtiver sucesso.</p><table><tr><td>Pontos de Poder</td><td>5</td></tr><tr><td>Duração</td><td>Instantâneo</td></tr><tr><td>Alcance</td><td>Até 18 metros de comprimento e 1,5 metro de largura, Linha</td></tr><tr><td>Requisito</td><td>Ação Poderosa</td></tr><tr><td>Dano</td><td>6d6 de dano de Energia</td></tr><tr><td>Ataque Combinado</td><td>Possível</td></tr></table><ul><li>Olho Gravador: Você consegue reproduzir holograficamente cenas, vozes ou textos que você tenha visto, em um espaço desocupado a até 1 metro de você.</li></ul><p>Cada personagem que não possua o Estilo de Combate Ciborgue pode sofrer até 3 modificações por meio dessa característica. Para cada modificação adicional além desse limite, o personagem perde 2 pontos no atributo de Presença.</p><p>Cada modificação possui os seguintes requisitos:</p><p>Custo: ฿ 10.000.000.</p><p>Tempo de Criação: 1 semana.</p><p><strong>CENTELHA DE MOTHER FLAME</strong></p><p>O cientista, ao dominar princípios avançados de engenharia energética e estabilidade material, torna-se capaz de desenvolver uma fonte de energia autossuficiente, capaz de recarregar ao final de 1 dia até 10 baterias grandes.</p><p>Para isso, ele precisa criar uma câmara blindada capaz de estabilizar a chama no espaço equivalente a 5 cômodos do navio, que custa ฿ 50.000.000.000 e leva 1 mês para ser construída (sua construção deve ser realizada por um engenheiro).</p><p><strong>CAPACIDADE GENIAL (REGRA OPCIONAL)</strong></p><p>Como regra alternativa, que o Narrador optar usar, o cientista é capaz de realizar absolutamente qualquer coisa por meio de suas criações, estando limitado apenas pelo tempo e pelo custo que o Narrador determinar para cada projeto (além de etapas específicas, como adquirir materiais, construir máquinas etc.).</p><p>Por exemplo, para tarefas simples, como criar um novo sabor de refrigerante, o custo pode ser de alguns milhares de Bellys, enquanto para desenvolver uma ilha-fortaleza voadora, o investimento pode alcançar centenas de bilhões.</p><p><strong>Ferramentas:</strong> 1 mochila pequena, 1 kit médico, 1 kit de pesquisa, 1 kit de primeiros socorros, 1 kit de chaves, 1 kit de construções, livros científicos diversos, 1 mini computador.</p>'
