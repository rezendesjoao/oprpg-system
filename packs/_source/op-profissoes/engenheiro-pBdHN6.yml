name: Engenheiro
type: feat
img: icons/sundries/scrolls/scroll-writing-tan.webp
system:
  description:
    value: '<p>O engenheiro é o responsável por unir conhecimento técnico e trabalho manual, transformando ideias em máquinas. Sua mente criativa é capaz de conceber projetos complexos que auxiliam diretamente nos objetivos da tripulação.</p><p><strong>ENGENHARIA NAVAL</strong></p><p>Grande parte dos estudos e esforços da engenharia do mundo são voltados para o aprimoramento de embarcações e tecnologias relacionadas às navegações, seja para fins pacíficos ou militares. Com isso, a engenharia naval avançou consideravelmente, possibilitando a criação das seguintes construções:</p><p><strong>CRIAR SUBMARINO</strong></p><p>O engenheiro possui o conhecimento e o vigor necessários para construir submarinos, seus cômodos, e outros componentes. Detalhes sobre tempo, valores, peças e propriedades do submarino estão no Capítulo 14 deste livro.</p><ul><li>Eficiência: Você reduz em 40% todos os possíveis custos adicionais de construção e reparo de submarinos, determinados pelo Narrador e que não sejam previamente definidos por regras ou não possuam um custo determinado, evitando desperdícios de matéria-prima.</li><li>Eficácia: Submarinos construídas por você recebem +6 nós (12 km/h) de velocidade.</li><li>Corpo Preparado: Enquanto estiver trabalhando na construção ou reparo de um submarino, seus dias ainda pode ser contabilizado normalmente para treinamentos.</li></ul><p><strong>ENGENHARIA AVANÇADA</strong></p><p>O engenheiro é capaz de desenvolver uma ampla variedade de mecanismos sofisticados. Todas as especificações — incluindo custos, materiais e tempo de construção dessas máquinas — estão descritas no Capítulo 14.</p><ul><li>Canhão de Energia: Um poderoso canhão frontal que concentra e dispara energia massiva contra seus alvos, sendo considerada a arma de destruição mais temida dos mares.</li><li>Cômodos Engenhados: Torna-se possível projetar e instalar áreas de alta tecnologia no navio, como uma sala de máquinas ou gerador de energia, que proporcionam melhorias significativas à embarcação.</li><li>Criar Mini Submarino: Um modelo compacto de submarino, capaz de explorar livremente as profundezas do mar, comportando até duas criaturas pequenas ou médias, ou uma criatura grande.</li><li>Motores: Conjuntos de motores capazes de aumentar significativamente a velocidade de embarcações e submarinos, superando até mesmo as adversidades de mares sem corrente.</li><li>Propulsão a Jato: Um mecanismo singular que permite às embarcações percorrer grandes distâncias em um instante. Apesar do longo tempo de preparo, é ideal para realizar fugas rápidas, mesmo em situações desesperadoras.</li><li>Revestir Casco com Kairoseki: Desde que tenha acesso ao material, o engenheiro é capaz de manipular grandes quantidades de kairoseki para revestir cascos de navios, tornando a embarcação imune a encontros com rei dos mares em Testes de Navegação, ignorando os efeitos de danos irreparáveis e aumentando a CR do navio em +1.</li></ul><p><strong>CRIAR ARMA DE GRANDE PORTE</strong></p><p>Os engenheiros são capazes de construir armas de grande porte para navios e fortalezas, projetadas especialmente para destruir construções como embarcações, muralhas e castelos.</p><p>Por terem essa finalidade, essas armas precisam ser robustas e possuir grande poder de fogo. Não costumam ser excessivamente complexas em seus mecanismos, mas exigem muito tempo de construção devido ao seu porte e à necessidade de resistência em combate.</p><p>Todas as especificações de construção — incluindo custos, materiais e tempo necessário — estão detalhadas no Capítulo 14.</p><p><strong>CONSERTO AVANÇADO</strong></p><p>Conforme construções complexas, como submarinos e robôs, são danificadas, cabe ao engenheiro realizar os reparos. Um trabalho que exige alto conhecimento de engenharia e trabalhos manuais.</p><p>O tempo de conserto varia de acordo com o nível de dano, além de envolver custos adicionais com materiais necessários para o reparo. As regras específicas estão descritas na tabela ''Construção Avançada Danificada''.</p><table><tr><th>Estado</th><th>Pontos de Vida</th><th>Tempo de Reparo</th><th>Custo Adicional</th></tr><tr><td>Normal</td><td>99% ou menos</td><td>2d6 dias</td><td>฿ 150.000</td></tr><tr><td>Danificado</td><td>70% ou menos</td><td>4d6 dias</td><td>฿ 1.000.000</td></tr><tr><td>Muito Danificado</td><td>30% ou menos</td><td>8d6 dias</td><td>฿ 3.000.000</td></tr></table><p>O custo para recuperar os Pontos de Vida de uma construção varia conforme o material utilizado no reparo:</p><ul><li>Aço: ฿ 550.000 por cada PV recuperado.</li><li>Aço Temperado: ฿ 750.000 por cada PV recuperado.</li></ul><p><strong>CONSTRUIR ROBÔ</strong></p><p>A criação de um robô exige tempo, recursos e grande investimento. Apenas o conhecimento técnico não é suficiente: são necessários materiais de alta qualidade, infraestrutura adequada e acesso a componentes raros.</p><p>O custo de construção de um corpo robótico, sua manutenção mensal (incluindo o uso de armamentos, munições e peças de reposição), bem como o consumo de energia, estão descritos na tabela ''Construção Robótica''.</p><table><tr><th>Dias de Construção</th><th>Custo de Construção</th><th>Manutenção Mensal</th></tr><tr><td>40 dias</td><td>฿ 500.000.000</td><td>฿ 2.000.000</td></tr></table><p>O engenheiro é capaz de controlar apenas um robô ativado por vez, independentemente da quantidade de unidades já construídas. A partir do momento da criação, o robô obedece unicamente ao seu criador.</p><p>Durante encontros, o robô age na mesma iniciativa do engenheiro. Qualquer ordem direcionada a um robô requer o uso da Ação Bônus do engenheiro.</p><p><strong>ORDENS</strong></p><p>Um robô depende de ordens diretas para executar suas ações. As instruções podem ser transmitidas verbalmente, por gestos ou através de dispositivos de comunicação. As principais ordens são:</p><ul><li>Atacar: O robô usa ações e ações poderosas para atacar uma criatura que o engenheiro ou o robô possam ver.</li><li>Defender: O robô se posiciona para proteger uma criatura designada. Enquanto permanecer a até 1,5 metro da criatura protegida, metade dos danos que ela receber são redirecionados para o robô. O engenheiro pode escolher gastar 10 PP do robô para que ele se mova rapidamente e receba todo o dano ao invés de metade.</li><li>Movimentação: Define o deslocamento do robô, como avançar para um local, manter posição ou seguir uma criatura específica.</li><li>Parar: Uma ordem absoluta que faz o robô interromper imediatamente qualquer ação ou comando em execução.</li></ul><p>O robô pode possuir protocolos automáticos para situações em que o engenheiro perde a consciência, a menos que tenham sido previamente instruídos a permanecer inativos. As programações mais comuns incluem:</p><ul><li>Vingança: O robô ataca a criatura que derrotou seu criador até que ela seja neutralizada (passa a ser controlado pelo jogador do engenheiro).</li><li>Salvar: O robô resgata e transporta seu criador até o último local seguro conhecido ou para um ponto previamente designado.</li><li>Proteger: O robô defende um local, construção ou pessoa previamente determinada, utilizando força letal ou não (passa a ser controlado pelo jogador do engenheiro).</li></ul><p><strong>ROBÔ</strong></p><p>NÍVEL DE DESAFIO: 10 | EXPERIÊNCIA: 10.000 | PONTOS DE PODER: 40</p><p>Classe de Resistência: 18</p><p>Pontos de Vida: 651 (62d12+248)</p><p>Bônus de Proficiência: +4</p><p>Classe de Dificuldade: 17</p><p>Deslocamento: 12 metros</p><p>Nado: 12 metros</p><table><tr><th>FOR</th><th>DES</th><th>CON</th><th>SAB</th><th>PRE</th><th>VON</th></tr><tr><td>20 (+5)</td><td>19 (+4)</td><td>19 (+4)</td><td>10 (0)</td><td>10 (0)</td><td>10 (0)</td></tr></table><p>Características</p><ul><li>Perícia: Atletismo +9, Percepção +4.</li><li>Categoria de Tamanho: Grande</li><li>Salvaguarda: Força +9, Constituição +8.</li><li>Invulnerabilidade a Dano: Psíquico e Veneno.</li><li>Invulnerabilidade à Condição: Amedrontado, Bêbado, Enfeitiçado, Envenenado, Exausto, Paralisado, Queimado, Sangramento e Sonolento.</li><li>Sentidos: Visão no Escuro (18 metros), Percepção passiva 19.</li></ul><p>Aspectos</p><ul><li>Absorção de Eletricidade: Sempre que o robô for alvo de dano Elétrico, ele não sofre qualquer dano e, ao invés disso, recupera uma quantidade de Pontos de Vida igual ao dano Elétrico causado.</li><li>Natureza Robótica: O robô não precisa respirar, comer, beber ou dormir (não pode ser posto para dormir).</li></ul><p>Ações</p><ul><li>Ataques Múltiplos: Pode atacar duas vezes por turno com ataque desarmado.</li><li>Ataque Desarmado: Ataque Corpo a Corpo: +9 para atingir, alcance 1,5 metro, um alvo. Acerto: 17 (2d12+5) de dano Contundente.</li></ul><p>Ações Poderosas</p><ul><li>Soco Biônico (Técnica de Combate – 4º Grau | Custo: 7 PP | Recarga 5-6): Ataque Corpo a Corpo: +9 para atingir, alcance 1,5 metro, um alvo. Acerto: 50 (9d10) de dano Contundente.</li></ul><p>Robôs não se recuperam com descanso. Para restaurar seus Pontos de Vida, é necessário que sejam consertados, de acordo com a característica ''Construção Avançada Danificada'', com o custo de peças de aço.</p><p>Quando um robô é reduzido a 0 PV, ele perde completamente sua funcionalidade e não pode ser reparado. Nessa situação, o engenheiro pode realizar um Teste de Atributo de Sabedoria CD 14 para tentar recuperar as partes vitais do corpo robótico.</p><p>Se for bem-sucedido, o robô recupera 1 Ponto de Vida, podendo então ser restaurado, conforme indicado na tabela ''Construção Avançada Danificada''.</p><p><strong>Ferramentas:</strong> 1 mochila pequena, livros de engenharia mecânica, física e computação, 1 martelo, 1 kit de chaves, 1 kit de construções e 1 mini computador.</p>'
