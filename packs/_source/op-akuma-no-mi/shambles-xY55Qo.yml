system:
  description:
    value: '<p>Você troca de lugar qualquer criatura voluntária ou objeto dentro da "ROOM". Com criaturas/objetos Médios (ou menores), realiza um número de trocas igual ao seu modificador de Vontade (mínimo 1), simultaneamente. Uma criatura trocada não provoca reações de nenhum tipo.</p><p>Criaturas não voluntárias só podem ser movidas se surpresas ou sob "Despedaçado", falhando numa Salvaguarda de Vontade. Tamanhos maiores aumentam o custo: Grande +2 PP; Enorme +6 PP.</p><p><em>Alternativamente (Reação):</em> quando você ou uma criatura voluntária visível for alvo de uma jogada de ataque ou Salvaguarda, troque-a de lugar com outra criatura/objeto na "ROOM".</p><hr><p><strong>Duração:</strong> Instantâneo</p><p><strong>Alcance:</strong> Área dentro da "ROOM"</p><p><strong>Requisito:</strong> Ope-Ope no Mi, "ROOM", Ação Bônus ou Reação</p><p><strong>Dano:</strong> Nenhum</p><p><strong>Custo:</strong> 2 PP</p>'
