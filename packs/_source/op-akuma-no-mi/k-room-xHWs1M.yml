  description:
    value: '<p>Técnica Auxiliar. Ao usar a Manifestação "ROOM", você pode usar esta técnica no lugar. A "K-ROOM" concentra a "ROOM" em uma arma cortante à sua escolha, que pode ser estendida por até 60 metros em linha. Qualquer técnica da Ope-Ope no Mi é ativada na arma, com o alcance da arma e afetando apenas um alvo, recebendo: o dado de dano vira d12; o resultado é sempre o máximo; o dano da técnica aumenta em 5 dados. Enquanto ativa, você não pode usar a "ROOM".</p><hr><p><strong>Duração:</strong> Até 1 minuto</p><p><strong>Alcance:</strong> Toque (arma até 60 m em linha)</p><p><strong>Requisito:</strong> Ope-Ope no Mi, Ação Bônus</p><p><strong>Custo:</strong> 15 PP</p>'
