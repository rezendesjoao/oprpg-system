    value: <p>Você coloca as mãos próximas a um alvo e libera uma descarga elétrica poderosa. O alvo faz uma Salvaguarda de Constituição, sofrendo todo o dano se falhar ou metade se obtiver sucesso. Se falhar no primeiro teste, deve passar em uma nova Salvaguarda de Constituição ou recebe "Atordoado" até o fim do seu próximo turno.</p><p><em>Alternativamente:</em> você pode optar por não causar a condição e aumentar o dano em mais 2d10.</p><hr><p><strong>Duração:</strong> Instantâneo</p><p><strong>Alcance:</strong> Toque</p><p><strong>Requisito:</strong> Ope-Ope no Mi, "ROOM", Ação Poderosa</p><p><strong>Dano:</strong> 10d10 de dano Elétrico</p><p><strong>Custo:</strong> 12 PP</p>
