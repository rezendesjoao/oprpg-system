  description:
    value: <p>Técnica Auxiliar. Ao usar a Manifestação "ROOM", você pode usar esta técnica no lugar. A "R-ROOM" concentra a "ROOM" em uma única criatura visível dentro do alcance, movendo-se junto com ela. Qualquer técnica da Ope-Ope no Mi é ativada remotamente dentro da "R-ROOM", fazendo a criatura falhar em qualquer Salvaguarda contra seus efeitos. Enquanto a "R-ROOM" estiver ativa, você não pode usar a "ROOM".</p><hr><p><strong>Duração:</strong> Até 1 minuto, Concentração</p><p><strong>Alcance:</strong> Até 39 metros, Linha</p><p><strong>Requisito:</strong> Ope-Ope no Mi, Ação Bônus</p><p><strong>Custo:</strong> 10 PP</p>
