name: Auto Release (push na main → patch++)

# A cada push na `main`, calcula a PRÓXIMA versão de PATCH mantendo o MAJOR.MINOR
# que estiver em `system.json` (ex.: 1.2.x → 1.2.(maior+1)), cria a tag e publica a release.
#
# • Para trocar de MINOR (ex.: ir pra 1.3.0): edite "version" no system.json para "1.3.0"
#   e dê push — como não há tag v1.3.* ainda, a próxima release vira v1.3.0; depois segue 1.3.1, 1.3.2…
# • Para pular a release num push específico: inclua [skip ci] na mensagem do commit.
#
# (Workflow autossuficiente — cria a tag E a release no mesmo job. Não dependemos do
#  release.yml porque tags criadas pelo GITHUB_TOKEN não disparam outros workflows.)

on:
  push:
    branches:
      - main

permissions:
  contents: write

# Serializa execuções: se vários pushes chegarem juntos, rodam um de cada vez (cada um
# recalcula a partir das tags já criadas), evitando colisão de versão.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Buscar tags
        run: git fetch --tags --force

      - name: Calcular próxima versão (patch++)
        id: ver
        run: |
          BASE=$(node -p "require('./system.json').version.split('.').slice(0,2).join('.')")
          SJPATCH=$(node -p "(require('./system.json').version.split('.')[2] || '0')")
          MAXP=$(git tag -l "v${BASE}.*" | sed "s#^v${BASE}\.##" | grep -E '^[0-9]+$' | sort -n | tail -1)
          if [ -z "$MAXP" ]; then NEXTP="$SJPATCH"; else NEXTP=$((MAXP + 1)); fi
          VERSION="${BASE}.${NEXTP}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Base MAJOR.MINOR=$BASE | maior patch em tags=${MAXP:-nenhum} | próxima=$TAG"

      - name: Abortar se a tag já existir
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.ver.outputs.tag }} já existe — abortando para não duplicar."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências (postinstall compila CSS e packs)
        run: npm install

      - name: Garantir build de CSS e compêndios
        run: npm run build:css && npm run build:db

      - name: Definir versão e download no system.json (artefato)
        run: |
          node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('system.json','utf8'));s.version='${{ steps.ver.outputs.version }}';s.download='https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/system.zip';fs.writeFileSync('system.json',JSON.stringify(s,null,2));"

      - name: Empacotar o sistema (system.zip)
        run: |
          zip -r system.zip . \
            -x 'node_modules/*' '.git/*' '.github/*' 'packs/_source/*' 'utils/*' 'test/*' 'examples/*' '*.map'

      - name: Criar tag + release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            system.zip system.json \
            --target "${{ github.sha }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "One Piece RPG ${{ steps.ver.outputs.tag }} (release automática a partir da main). Instale/atualize pelo manifesto: https://github.com/${{ github.repository }}/releases/latest/download/system.json"
